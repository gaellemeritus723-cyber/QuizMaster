<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Question - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #0f0f23; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .main { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .form-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px; }
        .form-control, .form-select { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 10px; }
        .form-control:focus, .form-select:focus { background: rgba(255,255,255,0.15); border-color: #6c63ff; color: #fff; box-shadow: none; }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .form-select option { background: #1a1a2e; }
        .form-label { color: rgba(255,255,255,0.8); font-weight: 600; }
        .option-group { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .correct-radio { accent-color: #06d6a0; }
    </style>
</head>
<body>
<div class="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold" th:text="${question.id == null ? '➕ Nouvelle Question' : '✏️ Modifier Question'}">Question</h2>
        <a href="/admin" class="btn btn-outline-light">← Retour</a>
    </div>

    <div class="form-card">
        <form th:action="@{/admin/question/save}" method="post">
            <input type="hidden" name="id" th:value="${question.id}"/>

            <div class="mb-4">
                <label class="form-label">📝 Texte de la question</label>
                <textarea name="text" class="form-control" rows="3" required
                          th:text="${question.text}" placeholder="Entrez votre question..."></textarea>
            </div>

            <div class="row mb-4">
                <div class="col-md-4">
                    <label class="form-label">📚 Catégorie</label>
                    <select name="category" class="form-select" required>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.name()}"
                                th:text="${cat.label}"
                                th:selected="${question.category == cat}">Cat</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">🎯 Difficulté</label>
                    <select name="difficulty" class="form-select" required>
                        <option th:each="diff : ${difficulties}"
                                th:value="${diff.name()}"
                                th:text="${diff.label}"
                                th:selected="${question.difficulty == diff}">Diff</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">⭐ Points</label>
                    <select name="points" class="form-select">
                        <option value="1" th:selected="${question.points == 1}">1 point</option>
                        <option value="2" th:selected="${question.points == 2}">2 points</option>
                        <option value="3" th:selected="${question.points == 3}">3 points</option>
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">🅰️ Options de réponse <small class="text-muted">(Cochez la bonne réponse)</small></label>
                <div th:each="i : ${#numbers.sequence(0, 3)}" class="option-group">
                    <div class="d-flex align-items-center gap-3">
                        <input type="radio" name="correctAnswerIndex" th:value="${i}"
                               class="correct-radio form-check-input"
                               th:checked="${question.options != null and question.optionCount > i and i == question.correctAnswerIndex}"
                               required style="width:20px;height:20px;"/>
                        <span class="fw-bold" th:text="${i == 0 ? 'A' : (i == 1 ? 'B' : (i == 2 ? 'C' : 'D'))}">A</span>
                        <input type="text" name="options"
                               class="form-control"
                               th:value="${question.options != null and question.optionCount > i ? question.options[i] : ''}"
                               th:placeholder="'Option ' + ${i == 0 ? 'A' : (i == 1 ? 'B' : (i == 2 ? 'C' : 'D'))}"
                               required/>
                    </div>
                </div>
                <small class="text-muted">Sélectionnez le bouton radio à côté de la bonne réponse.</small>
            </div>

            <div class="mb-4">
                <label class="form-label">💡 Explication (optionnelle)</label>
                <textarea name="explanation" class="form-control" rows="2"
                          th:text="${question.explanation}"
                          placeholder="Expliquez pourquoi c'est la bonne réponse..."></textarea>
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-primary px-5">💾 Enregistrer</button>
                <a href="/admin" class="btn btn-outline-light">Annuler</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
