<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Connexion - QuizMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; font-family: 'Segoe UI', sans-serif; }
        .auth-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 24px; padding: 50px 40px; width: 100%; max-width: 420px; margin: 0 auto; color: #fff; }
        .form-control { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 12px; padding: 12px 16px; }
        .form-control:focus { background: rgba(255,255,255,0.15); border-color: #6c63ff; color: #fff; box-shadow: 0 0 0 3px rgba(108,99,255,0.25); }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .form-label { color: rgba(255,255,255,0.8); font-weight: 600; margin-bottom: 6px; }
        .btn-login { background: linear-gradient(135deg, #6c63ff, #f50057); border: none; border-radius: 50px; padding: 13px; font-size: 1rem; font-weight: 600; width: 100%; transition: all 0.2s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(108,99,255,0.5); }
        .logo { font-size: 3rem; text-align: center; margin-bottom: 10px; }
        .divider { border-color: rgba(255,255,255,0.15); margin: 20px 0; }
        a { color: #6c63ff; }
        a:hover { color: #a89bff; }
    </style>
</head>
<body>
<div class="container">
    <div class="auth-card">
        <div class="logo">🎯</div>
        <h2 class="text-center fw-bold mb-1">QuizMaster</h2>
        <p class="text-center text-muted mb-4">Connectez-vous pour commencer</p>

        <!-- Messages -->
        <div th:if="${error}" class="alert alert-danger rounded-3 py-2 small" th:text="${error}"></div>
        <div th:if="${info}" class="alert alert-info rounded-3 py-2 small" th:text="${info}"></div>
        <div th:if="${param.registered}" class="alert alert-success rounded-3 py-2 small">
            Compte créé avec succès ! Vous pouvez vous connecter.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Nom d'utilisateur</label>
                <input type="text" name="username" class="form-control" placeholder="votre_pseudo" required autofocus/>
            </div>
            <div class="mb-4">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn btn-login text-white">Se connecter →</button>
        </form>

        <hr class="divider"/>
        <p class="text-center text-muted small mb-0">
            Pas encore de compte ? <a th:href="@{/register}">S'inscrire</a>
        </p>
    </div>
</div>
</body>
</html>
