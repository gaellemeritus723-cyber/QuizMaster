<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Inscription - QuizMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; font-family: 'Segoe UI', sans-serif; }
        .auth-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 24px; padding: 50px 40px; width: 100%; max-width: 440px; margin: 0 auto; color: #fff; }
        .form-control { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 12px; padding: 12px 16px; }
        .form-control:focus { background: rgba(255,255,255,0.15); border-color: #06d6a0; color: #fff; box-shadow: 0 0 0 3px rgba(6,214,160,0.25); }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .form-label { color: rgba(255,255,255,0.8); font-weight: 600; margin-bottom: 6px; }
        .form-text { color: rgba(255,255,255,0.4); font-size: 0.8rem; }
        .btn-register { background: linear-gradient(135deg, #06d6a0, #0094cc); border: none; border-radius: 50px; padding: 13px; font-size: 1rem; font-weight: 600; width: 100%; transition: all 0.2s; }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(6,214,160,0.4); }
        .divider { border-color: rgba(255,255,255,0.15); margin: 20px 0; }
        a { color: #6c63ff; }
        a:hover { color: #a89bff; }
    </style>
</head>
<body>
<div class="container">
    <div class="auth-card">
        <div style="font-size:2.5rem;text-align:center;margin-bottom:10px">📝</div>
        <h2 class="text-center fw-bold mb-1">Créer un compte</h2>
        <p class="text-center text-muted mb-4">Rejoignez QuizMaster gratuitement</p>

        <div th:if="${error}" class="alert alert-danger rounded-3 py-2 small" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <div class="mb-3">
                <label class="form-label">Nom d'utilisateur</label>
                <input type="text" name="username" class="form-control"
                       th:value="${username}" placeholder="marie_dupont"
                       required minlength="3" maxlength="50" autofocus/>
                <div class="form-text">Minimum 3 caractères, utilisé pour la connexion.</div>
            </div>
            <div class="mb-3">
                <label class="form-label">Prénom affiché <span class="text-muted fw-normal">(optionnel)</span></label>
                <input type="text" name="displayName" class="form-control"
                       th:value="${displayName}" placeholder="Marie" maxlength="100"/>
            </div>
            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control"
                       placeholder="••••••••" required minlength="4"/>
                <div class="form-text">Minimum 4 caractères.</div>
            </div>
            <div class="mb-4">
                <label class="form-label">Confirmer le mot de passe</label>
                <input type="password" name="confirmPassword" class="form-control"
                       placeholder="••••••••" required minlength="4"/>
            </div>
            <button type="submit" class="btn btn-register text-white">Créer mon compte →</button>
        </form>

        <hr class="divider"/>
        <p class="text-center text-muted small mb-0">
            Déjà inscrit ? <a th:href="@{/login}">Se connecter</a>
        </p>
    </div>
</div>
</body>
</html>
