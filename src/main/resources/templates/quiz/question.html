<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Question <span th:text="${questionNumber}"></span></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; }
        .quiz-container { max-width: 720px; margin: 0 auto; padding: 40px 20px; flex: 1; }
        .progress-bar-custom { background: rgba(255,255,255,0.1); border-radius: 50px; height: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #6c63ff, #f50057); border-radius: 50px; transition: width 0.5s ease; }
        .question-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 40px; margin: 30px 0; }
        .question-text { font-size: 1.3rem; font-weight: 600; line-height: 1.6; }
        .option-label { display: block; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 16px 24px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; font-size: 1rem; position: relative; }
        .option-label:hover { background: rgba(108,99,255,0.2); border-color: #6c63ff; transform: translateX(5px); }
        .option-radio { display: none; }
        .option-radio:checked + .option-label { background: rgba(108,99,255,0.3); border-color: #6c63ff; box-shadow: 0 0 20px rgba(108,99,255,0.3); }
        .option-letter { display: inline-block; width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; text-align: center; line-height: 32px; font-weight: 700; margin-right: 12px; font-size: 0.9rem; }
        .btn-submit { background: linear-gradient(135deg, #6c63ff, #f50057); border: none; border-radius: 50px; padding: 14px 40px; font-size: 1rem; font-weight: 600; transition: all 0.2s; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(108,99,255,0.5); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .info-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .timer { font-size: 1.5rem; font-weight: 700; color: #6c63ff; }
        .timer.warning { color: #f50057; animation: pulse 0.5s infinite; }
/*        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }*/
        .difficulty-badge { padding: 4px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; }
        .points-badge { background: rgba(255,215,0,0.2); border: 1px solid gold; padding: 4px 12px; border-radius: 50px; font-size: 0.85rem; color: gold; }
    </style>
</head>
<body>
<div class="quiz-container">
    <!-- Header -->
    <div class="info-bar">
        <div>
            <span th:text="${quizData.category.icon}">🎓</span>
            <strong th:text="${quizData.category.label}">Catégorie</strong>
            <span th:if="${quizData.difficulty != null}"
                  th:classappend="${quizData.difficulty.badgeClass == 'success' ? 'bg-success' : (quizData.difficulty.badgeClass == 'warning' ? 'bg-warning text-dark' : 'bg-danger')}"
                  class="difficulty-badge ms-2"
                  th:text="${quizData.difficulty.label}">Niveau</span>
        </div>
        <div class="timer" id="timer">⏱️ <span id="time">30</span>s</div>
    </div>

    <!-- Progress -->
    <div class="d-flex justify-content-between mb-2">
        <small>Question <strong th:text="${questionNumber}">1</strong> / <strong th:text="${totalQuestions}">10</strong></small>
        <small>Score actuel: <strong th:text="${quizData.score}">0</strong> ✓</small>
    </div>
    <div class="progress-bar-custom mb-4">
        <div class="progress-fill" th:style="'width: ' + ${progress} + '%'"></div>
    </div>

    <!-- Question -->
    <div class="question-card">
        <div class="d-flex justify-content-between align-items-start mb-3">
            <span class="text-muted small">Question [[${questionNumber}]]</span>
            <span class="points-badge" th:text="${question.points} + ' pt(s)'">1 pt</span>
        </div>
        <p class="question-text" th:text="${question.text}">Question text</p>

        <form th:action="@{/quiz/answer}" method="post" id="answerForm">
            <div class="mt-4">
                <div th:each="option, iter : ${question.options}">
                    <input type="radio" class="option-radio" name="answerIndex"
                           th:id="'opt' + ${iter.index}"
                           th:value="${iter.index}"
                           required/>
                    <label th:for="'opt' + ${iter.index}" class="option-label">
                        <span class="option-letter" th:text="${iter.index == 0 ? 'A' : (iter.index == 1 ? 'B' : (iter.index == 2 ? 'C' : 'D'))}">A</span>
                        <span th:text="${option}">Option</span>
                    </label>
                </div>
            </div>

            <div class="mt-4 text-center">
                <button type="submit" class="btn btn-submit text-white" id="submitBtn" disabled>
                    <span th:text="${questionNumber == totalQuestions ? '🏁 Terminer le Quiz' : '➡️ Question suivante'}">Suivant</span>
                </button>
            </div>
        </form>
    </div>

    <div class="text-center">
        <small class="text-muted">👤 <span th:text="${quizData.playerName}">Player</span></small>
    </div>
</div>

<script>
    // Enable submit when option selected
    document.querySelectorAll('.option-radio').forEach(r => {
        r.addEventListener('change', () => {
            document.getElementById('submitBtn').disabled = false;
        });
    });

    // Timer
    let timeLeft = 30;
    const timerEl = document.getElementById('time');
    const timerContainer = document.getElementById('timer');
    const interval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 10) timerContainer.classList.add('warning');
        if (timeLeft <= 0) {
            clearInterval(interval);
            // Auto submit with no answer selected (-1)
            document.getElementById('answerForm').submit();
        }
    }, 1000);

    // Stop timer on submit
    document.getElementById('answerForm').addEventListener('submit', () => clearInterval(interval));
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
